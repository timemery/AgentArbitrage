{% extends "layout.html" %}

{% block title %}Keepa Deals Query{% endblock %}

{% block content %}

<div class="tidy-container">
    <h2 class="tidy-header">Keepa Deals API Query</h2>
    <p class="tidy-text">
        Use this file to set the Keepa deals query. The query must be a valid JSON object.
    </p>

    <!-- No card wrapper for the main query box as per mockup -->
    <form action="{{ url_for('deals') }}" method="post" class="settings-form">
        <input type="hidden" name="action" value="update_query">
        <!-- Label removed to match mockup if it's redundant with header, or kept hidden -->
        <!-- The mockup shows the text "Keepa Deals API Query" as a header, then description. -->
        <!-- Then the code block starts immediately. -->

        <div class="form-group" style="margin-bottom: 20px;">
             <!-- <label for="keepa_query">Keepa API Query</label> -->
            <textarea id="keepa_query" name="keepa_query" class="tidy-code-block" rows="20">{{ keepa_query }}</textarea>
        </div>

        <div class="form-actions" style="margin-bottom: 20px;">
            <button type="submit" class="tidy-button">Save Query</button>
        </div>
    </form>

    <hr class="tidy-hr" style="margin: 30px 0;">

    <h3 class="tidy-header" style="font-size: 1.2rem; margin-bottom: 10px;">Admin Actions</h3>
    <div style="display: flex; align-items: center; gap: 15px;">
        <button id="refresh-prime-picks-btn" class="tidy-button" style="background-color: #28a745;">Refresh Prime Picks</button>
        <span id="prime-picks-status" class="tidy-text" style="color: #6c757d; font-size: 0.9rem;"></span>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const refreshBtn = document.getElementById('refresh-prime-picks-btn');
    const statusText = document.getElementById('prime-picks-status');
    let currentPrimePicksGeneratedAt = null;
    let pollInterval = null;

    refreshBtn.addEventListener('click', async () => {
        refreshBtn.disabled = true;
        refreshBtn.textContent = 'Starting...';
        statusText.textContent = 'Starting Prime Picks generation...';

        try {
            // Fetch initial state to know when it changes
            const initialMeta = await fetch('/api/deals?limit=1&agents_choice=1').then(res => res.json());
            if (initialMeta.pagination && initialMeta.pagination.prime_picks_generated_at) {
                currentPrimePicksGeneratedAt = initialMeta.pagination.prime_picks_generated_at;
            }

            const response = await fetch('/api/prime_picks/refresh', { method: 'POST' });
            const result = await response.json();

            if (result.status === 'success') {
                refreshBtn.textContent = 'Running';
                statusText.textContent = 'Prime Picks refresh started. Please wait...';

                // Start polling for completion
                pollInterval = setInterval(checkCompletion, 10000); // Check every 10 seconds
            } else {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Refresh Prime Picks';
                statusText.textContent = 'Failed to start refresh: ' + (result.message || 'Unknown error');
                statusText.style.color = '#dc3545';
            }
        } catch (err) {
            console.error('Refresh failed:', err);
            refreshBtn.disabled = false;
            refreshBtn.textContent = 'Refresh Prime Picks';
            statusText.textContent = 'Error starting refresh.';
            statusText.style.color = '#dc3545';
        }
    });

    async function checkCompletion() {
        try {
            // Need to pass agents_choice=1 to ensure the metadata query checks the prime picks table
            const metaRes = await fetch('/api/deals?limit=1&agents_choice=1');
            const metaData = await metaRes.json();

            if (metaData.pagination && metaData.pagination.prime_picks_generated_at) {
                const newGenAt = metaData.pagination.prime_picks_generated_at;

                if (currentPrimePicksGeneratedAt && currentPrimePicksGeneratedAt !== newGenAt) {
                    // It updated!
                    clearInterval(pollInterval);
                    statusText.textContent = 'New Prime Picks available! Redirecting to dashboard...';
                    statusText.style.color = '#28a745';
                    refreshBtn.textContent = 'Complete';

                    setTimeout(() => {
                        window.location.href = '/dashboard?agents_choice=1';
                    }, 1500);
                } else if (!currentPrimePicksGeneratedAt) {
                    // First time ever
                    currentPrimePicksGeneratedAt = newGenAt;
                }
            }
        } catch (e) {
            console.error("Poll failed", e);
        }
    }
});
</script>

{% endblock %}
